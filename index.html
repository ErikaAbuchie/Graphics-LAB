<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pop the Bubbles 🫧</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="game-container">
    <h1>Pop the Bubbles 🫧</h1>

    <div class="score-row">
    <div class="stat">Score <span id="scoreVal">0</span></div>
    <div class="stat">Missed <span id="missedVal">0</span></div>
    <div class="stat">Level <span id="levelVal">1</span></div>
    </div>

    <canvas id="gameCanvas" width="580" height="380"></canvas>

    <p class="hint">Click the bubbles before they float away!</p>
    <button id="restartBtn">Restart</button>  </div>

<script src="game.js"></script>
</body>
</html>
